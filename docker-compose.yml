services:
  geneotools:
    container_name: geneotools
    build:
      context: .
      dockerfile: Dockerfile
    image: geneotools:latest
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.geneotools.rule=Host(`geneotools.ak-net.ru`)"
      - "traefik.http.routers.geneotools.entrypoints=websecure"
      - "traefik.http.routers.geneotools.tls=true"
      - "traefik.http.routers.geneotools.tls.certresolver=le"
      - "traefik.http.services.geneotools.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  traefik:
    external: true
    name: traefik_default
